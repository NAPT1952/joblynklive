<!-- FORM -->
<div class="card">

<h2>Submit Job Details</h2>

<p>
Fill the form below and our team will publish your vacancy within 24 hours.
Employers can post hospitality, retail, BPO, logistics, maritime, hotel, restaurant,
sales, and international jobs completely free on JobLynk.live.
</p>

<form action="https://formsubmit.co/joblynklive@gmail.com" method="POST">

    <!-- SETTINGS -->
    <input type="hidden" name="_captcha" value="false">

    <input type="hidden" name="_subject" value="New Employer Job Posting - JobLynk.live">

    <input type="hidden" name="_next" value="https://joblynk.live/thankyou.html">

    <!-- NAME -->
    <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="Full Name" placeholder="Your Name" required>
    </div>

    <!-- EMAIL -->
    <div class="form-group">
        <label>Email Address *</label>
        <input type="email" name="Email" placeholder="Email Address" required>
    </div>

    <!-- PHONE -->
    <div class="form-group">
        <label>Phone Number *</label>
        <input type="tel" name="Phone" placeholder="+91 97693 51231" required>
    </div>

    <!-- LOCATION -->
    <div class="form-group">
        <label>Job Location *</label>
        <input type="text" name="Location" placeholder="Mumbai, Dubai, Goa etc." required>
    </div>

    <!-- JOB TITLE -->
    <div class="form-group">
        <label>Job Title *</label>
        <input type="text" name="Job Title" placeholder="Chef, Waiter, Driver, BPO Executive etc." required>
    </div>

    <!-- OPENINGS -->
    <div class="form-group">
        <label>Number of Openings *</label>
        <input type="number" name="Openings" placeholder="5" required>
    </div>

    <!-- SALARY -->
    <div class="form-group">
        <label>Salary *</label>
        <input type="text" name="Salary" placeholder="₹25,000 per month" required>
    </div>

    <!-- DESCRIPTION -->
    <div class="form-group">
        <label>Job Description *</label>
        <textarea name="Job Description" rows="6" placeholder="Describe duties, timing, experience, accommodation, food, visa, benefits etc." required></textarea>
    </div>

    <!-- SUBMIT -->
    <button type="submit">Submit Job Posting</button>

</form>

</div>
